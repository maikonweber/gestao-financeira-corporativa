services:
  postgres:
    image: postgres:16-alpine
    container_name: corporate-finance-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corporate_finance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d corporate_finance']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
